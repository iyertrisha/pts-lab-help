<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Exam — Complete Foolproof Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0d0f14;
    --bg2: #13161f;
    --bg3: #1a1e2a;
    --bg4: #22273a;
    --border: #2a2f45;
    --border2: #363d58;
    --text: #e8eaf0;
    --text2: #9da3bc;
    --text3: #5e6480;
    --green: #3dd68c;
    --green-dim: #1a3d2b;
    --green-border: #2a6647;
    --yellow: #f5c542;
    --yellow-dim: #2d2500;
    --yellow-border: #5a4800;
    --red: #ff5370;
    --red-dim: #2d0f15;
    --red-border: #5a1f2a;
    --blue: #82aaff;
    --blue-dim: #0f1a35;
    --orange: #ff9d57;
    --orange-dim: #2d1800;
    --purple: #c792ea;
    --cyan: #89ddff;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .header-title {
    font-family: var(--sans); font-size: 16px; font-weight: 800;
    letter-spacing: -0.02em; color: var(--text);
  }
  .header-title span { color: var(--green); }
  .progress-info { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  .progress-track {
    height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), #5ef0b0);
    border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .target-pills {
    display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
  }
  .pill {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    border: 1px solid; font-family: var(--mono);
  }
  .pill-green { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
  .pill-blue  { color: var(--blue);  border-color: #1a3060; background: var(--blue-dim); }
  .pill-orange{ color: var(--orange); border-color: #3d2000; background: var(--orange-dim); }
  .pill-purple{ color: var(--purple); border-color: #3a1f5a; background: #1a0f2d; }

  /* Nav pills = real buttons (were spans with no handlers) */
  button.pill {
    font: inherit;
    font-family: var(--mono);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  button.pill:hover { filter: brightness(1.08); }
  button.pill:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  /* ── Layout ── */
  .main { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ── Section (Phase) ── */
  .section {
    margin-bottom: 8px;
    scroll-margin-top: 96px; /* sticky header clearance for in-page nav */
  }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .section-header:hover { background: var(--bg3); border-color: var(--border2); }
  .section-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    letter-spacing: 0.08em; flex-shrink: 0;
  }
  .badge-setup  { background: var(--blue-dim); color: var(--blue); border: 1px solid #1a3060; }
  .badge-enum   { background: #1a2030; color: #82aaff; border: 1px solid #263050; }
  .badge-juice  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
  .badge-shep   { background: var(--blue-dim); color: var(--cyan); border: 1px solid #1a3060; }
  .badge-nano   { background: var(--orange-dim); color: var(--orange); border: 1px solid #3d2000; }
  .badge-wrap   { background: var(--purple-dim,#1a0f2d); color: var(--purple); border: 1px solid #3a1f5a; }

  .section-title { font-family: var(--sans); font-size: 13px; font-weight: 700; flex: 1; }
  .section-meta { font-size: 10px; color: var(--text3); }
  .section-chevron { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
  .section-chevron.open { transform: rotate(90deg); }

  .section-body { display: none; padding-top: 4px; }
  .section-body.open { display: block; }

  /* ── Challenge card ── */
  .challenge {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 4px 0;
    overflow: hidden;
    background: var(--bg);
  }
  .challenge.solved { border-color: var(--green-border); }

  .challenge-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; cursor: pointer;
    background: var(--bg2);
    transition: background 0.1s;
  }
  .challenge-header:hover { background: var(--bg3); }

  .ch-index {
    width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    background: var(--bg4); color: var(--text2);
    border: 1px solid var(--border);
  }
  .ch-index.solved { background: var(--green-dim); color: var(--green); border-color: var(--green-border); }
  .ch-title { font-size: 12px; font-weight: 600; flex: 1; color: var(--text); }
  .ch-stars { font-size: 10px; color: var(--yellow); letter-spacing: -1px; }
  .ch-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    border: 1px solid; letter-spacing: 0.05em; font-weight: 600;
  }
  .tag-sqli   { color: var(--red); border-color: var(--red-border); background: var(--red-dim); }
  .tag-xss    { color: var(--orange); border-color: #3d2000; background: var(--orange-dim); }
  .tag-idor   { color: var(--blue); border-color: #1a3060; background: var(--blue-dim); }
  .tag-expo   { color: var(--yellow); border-color: var(--yellow-border); background: var(--yellow-dim); }
  .tag-auth   { color: var(--purple); border-color: #3a1f5a; background: #1a0f2d; }
  .tag-misc   { color: var(--text2); border-color: var(--border); background: var(--bg3); }
  .tag-rce    { color: var(--red); border-color: var(--red-border); background: var(--red-dim); }
  .tag-brute  { color: var(--cyan); border-color: #1a3060; background: var(--blue-dim); }
  .tag-recon  { color: var(--text2); border-color: var(--border); background: var(--bg3); }

  .ch-chevron { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
  .ch-chevron.open { transform: rotate(90deg); }

  .challenge-body { display: none; padding: 12px 14px 14px; }
  .challenge-body.open { display: block; }

  /* ── Content blocks ── */
  .block-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--text3); text-transform: uppercase; margin: 12px 0 5px;
  }
  .block-label:first-child { margin-top: 0; }

  .cmd-block {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 12px;
    font-family: var(--mono); font-size: 11.5px;
    color: var(--text); position: relative;
    white-space: pre-wrap; word-break: break-all;
    line-height: 1.7; margin: 4px 0;
  }
  .cmd-block .prompt { color: var(--green); font-weight: 700; }
  .cmd-block .comment { color: var(--text3); }
  .cmd-block .hl { color: var(--cyan); }
  .cmd-block .payload { color: var(--red); }

  .copy-btn {
    position: absolute; top: 7px; right: 7px;
    font-size: 9px; padding: 2px 7px; border-radius: 3px;
    border: 1px solid var(--border2); cursor: pointer;
    background: var(--bg4); color: var(--text2);
    font-family: var(--mono); transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--border2); color: var(--text); }
  .copy-btn.copied { color: var(--green); border-color: var(--green-border); }

  .out-block {
    background: var(--bg3); border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 9px 12px; font-family: var(--mono);
    font-size: 11.5px; color: var(--text2);
    white-space: pre-wrap; line-height: 1.7; margin: 4px 0;
  }
  .out-block .hl  { color: var(--green); font-weight: 600; }
  .out-block .warn{ color: var(--yellow); }
  .out-block .err { color: var(--red); }
  .out-block .dim { color: var(--text3); }

  .fix-block {
    background: var(--yellow-dim); border: 1px solid var(--yellow-border);
    border-radius: var(--radius); padding: 9px 12px;
    font-size: 11.5px; color: var(--yellow); line-height: 1.7; margin: 4px 0;
  }
  .fix-block b { font-weight: 700; }
  .fix-block code {
    background: #3d2f00; padding: 1px 5px; border-radius: 3px;
    color: var(--orange);
  }

  .info-block {
    background: var(--blue-dim); border: 1px solid #1a3060;
    border-radius: var(--radius); padding: 9px 12px;
    font-size: 11.5px; color: var(--blue); line-height: 1.7; margin: 4px 0;
  }
  .info-block b { color: var(--cyan); font-weight: 700; }

  .critical-block {
    background: var(--red-dim); border: 1px solid var(--red-border);
    border-radius: var(--radius); padding: 9px 12px;
    font-size: 11.5px; color: var(--red); line-height: 1.7; margin: 4px 0;
  }
  .critical-block b { font-weight: 700; }

  /* ── Checklist ── */
  .checklist { margin: 4px 0; }
  .check-row {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    transition: opacity 0.15s;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row:hover { opacity: 0.85; }
  .check-box {
    width: 15px; height: 15px; border-radius: 3px; flex-shrink: 0; margin-top: 1px;
    border: 1px solid var(--border2); background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--green); font-weight: 700;
    transition: all 0.15s;
  }
  .check-box.checked { background: var(--green-dim); border-color: var(--green-border); }
  .check-label { font-size: 11.5px; color: var(--text); line-height: 1.5; }
  .check-label.done { color: var(--text3); text-decoration: line-through; }

  /* ── Step divider ── */
  .step-num-inline {
    display: inline-block; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 3px; font-size: 9px; color: var(--text2); padding: 1px 5px;
    margin-right: 5px; font-weight: 700;
  }

  /* ── Scroll ── */
  html { scroll-behavior: smooth; }

  /* ── Responsive ── */
  @media(max-width:600px) {
    .main { padding: 14px 10px 60px; }
    .cmd-block, .out-block { font-size: 10.5px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">Lab Exam <span>Guide</span></div>
    <div class="progress-info" id="prog-text">0 / 0 done</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="target-pills">
    <button type="button" class="pill pill-green" onclick="scrollToSection('p3')" title="Jump to Juice Shop section">🟢 Juice Shop — 12+ challenges</button>
    <button type="button" class="pill pill-blue" onclick="scrollToSection('p4')" title="Jump to Security Shepherd section">🔵 Security Shepherd — 4 challenges</button>
    <button type="button" class="pill pill-orange" onclick="scrollToSection('p5')" title="Jump to Nanocorp Bites section">🟠 Nanocorp Bites — recon only</button>
    <button type="button" class="pill pill-purple" onclick="scrollToSection('p6')" title="Jump to final screenshots & submission">⚡ Wrap-up & submission</button>
  </div>
</div>

<div class="main" id="app"></div>

<script>
// ════════════════════════════════════════════════
// DATA — each section → challenges → steps/checks
// ════════════════════════════════════════════════
const GUIDE = [

// ──────────────────────────────────────────────
{
  id:'p0', badge:'SETUP', badgeClass:'badge-setup',
  title:'Environment Setup & Verification',
  meta:'Do this FIRST before anything else',
  challenges:[
    {
      id:'c0_1', title:'Start the lab executable', tag:'misc',
      checks:[
        'Downloaded lab file from Proton Drive (password: lab$@MSRIT)',

// ──────────────────────────────────────────────
{
  id:'p1', badge:'ENUM', badgeClass:'badge-enum',

    {

        { label:'SECURITY SHEPHERD — look for this', type:'out',
          text:'PORT     STATE SERVICE VERSION\n<span class="hl">8080/tcp open  http    Apache Tomcat\n|_http-title: Security Shepherd</span>' },

      ]
    },
  ]
},

{
  id:'p3', badge:'JUICE SHOP', badgeClass:'badge-juice',
  title:'OWASP Juice Shop — 12 Challenges',
  meta:'Complete as many as possible · each one shows a green toast when solved',
  challenges:[

    {
      id:'js1', title:'JS-01 — Score Board (Security Misconfiguration ★)', tag:'misc', stars:'★',

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const state = {};
let totalChecks = 0;

function countTotal() {
  let n = 0;
  GUIDE.forEach(s => s.challenges.forEach(c => { if(c.checks) n += c.checks.length; }));
  return n;
}
function countDone() {
  return Object.values(state).filter(Boolean).length;
}
function updateProgress() {
  const done = countDone();
  const total = totalChecks;
  document.getElementById('prog-text').textContent = done + ' / ' + total + ' done';
  document.getElementById('prog-fill').style.width = total ? (done/total*100)+'%' : '0%';
}

/** Header nav: scroll to a phase block (id sec_p0 … sec_p6) */
function scrollToSection(phaseId) {
  const el = document.getElementById('sec_' + phaseId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function renderContent(steps) {
  return steps.map(step => {
    if(step.type === 'cmd') {
      const plain = step.text.replace(/<[^>]+>/g,'');
      const id = 'cb'+Math.random().toString(36).slice(2,8);
      return `<p class="block-label">${step.label||'COMMAND'}</p>
<div class="cmd-block" id="${id}">
  <button class="copy-btn" onclick="doCopy('${id}',this,'${plain.replace(/'/g,"\\'")}')">copy</button>
  <span class="prompt">$ </span>${step.text}
</div>`;
    }
    if(step.type === 'out') {
      return `<p class="block-label">${step.label||'EXPECTED OUTPUT'}</p>
<div class="out-block">${step.text}</div>`;
    }
    if(step.type === 'fix') {
      return `<p class="block-label">⚠ IF SOMETHING GOES WRONG</p>
<div class="fix-block">${step.text}</div>`;
    }
    if(step.type === 'info') {
      return `<p class="block-label">ℹ TIP / BONUS</p>
<div class="info-block">${step.text}</div>`;
    }
    if(step.type === 'critical') {
      return `<p class="block-label">🚨 CRITICAL</p>
<div class="critical-block">${step.text}</div>`;
    }
    return '';
  }).join('');
}

function renderChecklist(challenge) {
  if(!challenge.checks) return '';
  return challenge.checks.map((c,i) => {
    const key = challenge.id+'_'+i;
    const done = !!state[key];
    return `<div class="check-row" onclick="toggle('${key}',this)">
      <div class="check-box${done?' checked':''}">${done?'✓':''}</div>
      <div class="check-label${done?' done':''}">${c}</div>
    </div>`;
  }).join('');
}

function renderChallenge(ch) {
  const tagMap = {
    sqli:'tag-sqli',xss:'tag-xss',idor:'tag-idor',expo:'tag-expo',
    auth:'tag-auth',misc:'tag-misc',rce:'tag-rce',brute:'tag-brute',recon:'tag-recon'
  };
  const tagLabels = {
    sqli:'SQL Injection',xss:'XSS',idor:'IDOR',expo:'Data Exposure',
    auth:'Auth',misc:'Misc',rce:'RCE',brute:'Brute Force',recon:'Recon'
  };
  return `
<div class="challenge" id="ch_${ch.id}">
  <div class="challenge-header" onclick="toggleCh('${ch.id}')">
    <div class="ch-index" id="idx_${ch.id}">→</div>
    <div class="ch-title">${ch.title}</div>
    ${ch.stars ? `<span class="ch-stars">${ch.stars}</span>` : ''}
    ${ch.tag ? `<span class="ch-tag ${tagMap[ch.tag]||'tag-misc'}">${tagLabels[ch.tag]||ch.tag}</span>` : ''}
    <span class="ch-chevron open" id="chev_${ch.id}">▶</span>
  </div>
  <div class="challenge-body open" id="body_${ch.id}">
    ${ch.checks ? `<p class="block-label">CHECKLIST — tick as you go</p>
<div class="checklist">${renderChecklist(ch)}</div>` : ''}
    ${ch.steps ? renderContent(ch.steps) : ''}
  </div>
</div>`;
}

function renderSection(sec) {
  return `
<div class="section" id="sec_${sec.id}">
  <div class="section-header" onclick="toggleSec('${sec.id}')">
    <span class="section-badge ${sec.badgeClass}">${sec.badge}</span>
    <span class="section-title">${sec.title}</span>
    <span class="section-meta">${sec.meta||''}</span>
    <span class="section-chevron open" id="schev_${sec.id}">▶</span>
  </div>
  <div class="section-body open" id="sbody_${sec.id}">
    ${sec.challenges.map(renderChallenge).join('')}
  </div>
</div>`;
}

function render() {
  totalChecks = countTotal();
  document.getElementById('app').innerHTML = GUIDE.map(renderSection).join('');
  updateProgress();
}

// ════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════
function toggle(key, row) {
  state[key] = !state[key];
  const box = row.querySelector('.check-box');
  const label = row.querySelector('.check-label');
  box.classList.toggle('checked', !!state[key]);
  box.textContent = state[key] ? '✓' : '';
  label.classList.toggle('done', !!state[key]);
  updateProgress();
}

function toggleSec(id) {
  const body = document.getElementById('sbody_'+id);
  const chev = document.getElementById('schev_'+id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleCh(id) {
  const body = document.getElementById('body_'+id);
  const chev = document.getElementById('chev_'+id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function doCopy(blockId, btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
  });
}

render();
</script>
